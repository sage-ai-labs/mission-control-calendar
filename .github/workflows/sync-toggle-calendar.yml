name: Sync Toggle Calendar Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh calendar data
        run: python scripts/sync_toggle_calendar.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/mission-control.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/mission-control.json
          git commit -m "Update toggle calendar data"
          git push
